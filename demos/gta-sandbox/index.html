<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GTA Sandbox — 3d-game-kit (Three.js + Rapier)</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body { width: 100%; height: 100%; overflow: hidden; background: #000; font-family: Arial, "Helvetica Neue", sans-serif; }
      canvas { display: block; }
      #hud { position: fixed; inset: 0; pointer-events: none; z-index: 10; display: none; }

      #wanted { position: absolute; top: 18px; right: 24px; font-size: 30px; letter-spacing: 4px; color: #444; text-shadow: 0 2px 4px rgba(0,0,0,.6); }
      #wanted .on { color: #ffd23f; }

      #mission { position: absolute; top: 18px; left: 24px; max-width: 380px; color: #fff; text-shadow: 0 2px 4px rgba(0,0,0,.7); }
      #mission .label { font-size: 12px; letter-spacing: 2px; opacity: .7; }
      #mission .obj { font-size: 19px; font-weight: 700; margin-top: 2px; }
      #mission .nav { font-size: 16px; font-weight: 700; margin-top: 6px; color: #ffd23f; }

      #prompt { position: absolute; left: 50%; bottom: 92px; transform: translateX(-50%); color: #fff; background: rgba(0,0,0,.45); padding: 8px 18px; border-radius: 6px; font-size: 15px; display: none; }
      #prompt b { color: #ffd23f; }

      #health-wrap { position: absolute; left: 24px; bottom: 30px; width: 220px; height: 14px; background: rgba(0,0,0,.35); border: 1px solid rgba(255,255,255,.25); border-radius: 3px; }
      #health-bar { height: 100%; width: 100%; background: #e6e6e6; border-radius: 2px; transition: width .15s; }
      #speed { position: absolute; right: 24px; bottom: 26px; color: #fff; font-size: 30px; font-weight: 700; text-shadow: 0 2px 4px rgba(0,0,0,.7); display: none; }
      #speed small { font-size: 14px; opacity: .7; }
      #toast { position: absolute; left: 50%; top: 40%; transform: translateX(-50%); color: #ffd23f; font-size: 26px; font-weight: 800; text-shadow: 0 2px 8px rgba(0,0,0,.8); opacity: 0; transition: opacity .3s; }

      #menu { position: fixed; inset: 0; z-index: 20; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #0a0a0c; color: #fff; }
      #menu h1 { font-weight: 800; letter-spacing: 8px; font-size: 42px; }
      #menu .sub { opacity: .5; letter-spacing: 3px; margin: 8px 0 34px; font-size: 13px; }
      #play { pointer-events: auto; padding: 14px 50px; font-size: 20px; font-weight: 700; letter-spacing: 3px; background: #ffd23f; color: #111; border: none; border-radius: 5px; cursor: pointer; }
      #play[disabled] { opacity: .4; cursor: default; }
      #progress-wrap { width: 320px; height: 6px; background: #222; margin-top: 24px; border-radius: 3px; overflow: hidden; }
      #progress { height: 100%; width: 0%; background: #ffd23f; transition: width .2s; }
      #hint { margin-top: 18px; font-size: 12px; opacity: .45; letter-spacing: 1px; line-height: 1.8; text-align: center; }

      /* 内容包校验失败遮罩（P1） */
      #content-errors { display: none; position: fixed; left: 50%; top: 12%; transform: translateX(-50%);
        z-index: 30; width: min(760px, 92vw); background: #2a0d0d; border: 1px solid #ff5a5a; border-radius: 8px;
        padding: 18px 22px; color: #ffd9d9; font-size: 14px; line-height: 1.7; }
      #content-errors .ce-title { color: #ff6b6b; font-weight: 800; font-size: 16px; margin-bottom: 10px; }
      #content-errors .ce-item { margin: 4px 0; }
      #content-errors .ce-item b { color: #ffb3b3; }
    </style>
  </head>
  <body>
    <div id="hud">
      <div id="wanted"></div>
      <div id="mission"><div class="label">任务 MISSION</div><div class="obj">—</div><div class="nav"></div></div>
      <div id="prompt"></div>
      <div id="health-wrap"><div id="health-bar"></div></div>
      <div id="speed">0 <small>km/h</small></div>
      <div id="toast"></div>
    </div>

    <div id="content-errors"></div>

    <div id="menu">
      <h1>CITY SANDBOX</h1>
      <div class="sub">THREE.JS + RAPIER · GTA-STYLE DEMO</div>
      <button id="play" disabled>LOADING…</button>
      <div id="progress-wrap"><div id="progress"></div></div>
      <div id="hint">WASD 移动/驾驶 · 鼠标看向 · <b>F 上/下车</b> · G 制造事端(涨通缉) · 空格跳 · <b>E 可视化编辑器</b><br/>到黄色光柱完成任务 · 甩掉警察降通缉</div>
    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
